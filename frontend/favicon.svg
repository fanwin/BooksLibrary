<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <defs>
    <!-- 背景渐变：深蓝到靛蓝 -->
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1e40af"/>
      <stop offset="100%" style="stop-color:#312e81"/>
    </linearGradient>
    <!-- 书本封面渐变：琥珀色 -->
    <linearGradient id="bookGrad1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f59e0b"/>
      <stop offset="100%" style="stop-color:#d97706"/>
    </linearGradient>
    <!-- 书本封面渐变2 -->
    <linearGradient id="bookGrad2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#60a5fa"/>
      <stop offset="100%" style="stop-color:#2563eb"/>
    </linearGradient>
    <!-- 页面渐变 -->
    <linearGradient id="pageGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#ffffff"/>
      <stop offset="100%" style="stop-color:#e5e7eb"/>
    </linearGradient>
    <!-- 阴影滤镜 -->
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="2" stdDeviation="2" flood-color="#00000030"/>
    </filter>
  </defs>

  <!-- 圆角背景（浏览器标签页显示为圆角） -->
  <rect width="64" height="64" rx="14" fill="url(#bgGrad)"/>

  <!-- ====== 打开的书本图标 ====== -->

  <!-- 左侧书本（向后倾斜） -->
  <g filter="url(#shadow)" transform="translate(8, 16)">
    <!-- 左书封底 -->
    <path d="M4 32 L4 6 Q4 4 6 4 L22 8 Q24 8.5 24 10 L24 36 Q24 38 22 37 L6 33 Q4 32.5 4 32Z"
          fill="url(#bookGrad2)"/>
    <!-- 左书页面 -->
    <path d="M7 31 L7 8 Q7 7 8 7 L21 10 Q22 10.3 22 11 L11 8 Q10 7.7 10 8.5 L10 31.5Q10 32.5 11 32.7L22 35.5Q23 35.7 23 34.7L23 12Q23 11 21 10.7L8 7.7Q7 7.4 7 8.5L7 31Z"
          fill="url(#pageGrad)"/>
    <!-- 左书书脊高光 -->
    <path d="M4 6 Q4 4 6 4 L6 32 Q4 32.5 4 32Z" fill="#1d4ed880"/>
    <!-- 左书文字线条 -->
    <line x1="10" y1="15" x2="18" y2="17" stroke="#94a3b8" stroke-width="1.5" stroke-linecap="round"/>
    <line x1="10" y1="20" x2="19" y2="22.5" stroke="#cbd5e1" stroke-width="1.5" stroke-linecap="round"/>
    <line x1="10" y1="25" x2="17" y2="27" stroke="#cbd5e1" stroke-width="1.5" stroke-linecap="round"/>
  </g>

  <!-- 右侧书本（向前倾斜） -->
  <g filter="url(#shadow)" transform="translate(28, 12)">
    <!-- 右书封底 -->
    <path d="M4 36 L4 10 Q4 8 6 8 L22 4 Q24 3.5 24 6 L24 32 Q24 34 22 33 L6 37 Q4 36.5 4 36Z"
          fill="url(#bookGrad1)"/>
    <!-- 右书页面 -->
    <path d="M7 35 L7 12 Q7 11 8 11 L21 7 Q22 6.7 22 7.5 L22 30.5Q22 31.5 21 31.7L11 35Q10 35.3 10 34.5L10 11.5Q10 10.5 11 10.3L22 6.7Q23 6.5 23 7.5L23 29.5Q23 30.5 22 30.7L8 34Q7 34.3 7 33.5L7 35Z"
          fill="url(#pageGrad)"/>
    <!-- 右书书脊高光 -->
    <path d="M4 10 Q4 8 6 8 L6 36 Q4 36.5 4 36Z" fill="#b4530980"/>
    <!-- 右书文字线条 -->
    <line x1="10" y1="14" x2="18" y2="12" stroke="#94a3b8" stroke-width="1.5" stroke-linecap="round"/>
    <line x1="10" y1="19" x2="19" y2="16.5" stroke="#cbd5e1" stroke-width="1.5" stroke-linecap="round"/>
    <line x1="10" y1="24" x2="17" y2="22" stroke="#cbd5e1" stroke-width="1.5" stroke-linecap="round"/>
  </g>

  <!-- 底部装饰：小书本/标签点缀 -->
  <rect x="20" y="50" width="8" height="10" rx="1.5" fill="#fcd34d" opacity="0.9"/>
  <rect x="30" y="48" width="6" height="12" rx="1.5" fill="#93c5fd" opacity="0.85"/>
  <rect x="38" y="51" width="7" height="9" rx="1.5" fill="#fca5a5" opacity="0.8"/>
</svg>